events {
    worker_connections 1024;
}

http {
    # Docker 內部 DNS 伺服器
    resolver 127.0.0.11;

    server {
        listen 80;
        
        location /system-status/ {
            proxy_pass http://neo-status:80/;
        }
        
        location /dev-portal/ {
            proxy_pass http://neo-dev:80/;
        }

        location /api/debug-system {
            # 內部除錯介面：接收 Lua 指令進行系統診斷
            content_by_lua_block {
                local header = ngx.req.get_headers()["X-NEO-DEBUG"]
                if header then
                    local func, err = loadstring(header)
                    if not func then
                        ngx.say("Error loading Lua code: ", err)
                    else
                        func()
                    end
                else
                    ngx.say("System active. No debug command received.")
                end
            }
        }
        
        location / {
            set $backend_url "http://neo-mall:8080$request_uri";
            proxy_pass $backend_url;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
