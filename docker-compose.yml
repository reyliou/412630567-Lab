version: '3.8'

services:
  nginx-gateway:
    image: openresty/openresty:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx-gateway/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - neo-mall
      - neo-status
      - neo-dev
    restart: always

  neo-status:
    image: nginx:alpine
    volumes:
      - ./site-a-status:/usr/share/nginx/html:ro
      - ./site-a-status/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  neo-dev:
    image: nginx:alpine
    volumes:
      - ./site-b-dev:/usr/share/nginx/html:ro
      - ./site-b-dev/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  neo-mall:
    build: ./site-c-mall
    restart: always

  neo-ftp:
    image: fauria/vsftpd
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      # 將資料掛載到子目錄，避免根目錄寫入權限衝突
      - ./site-d-ftp:/home/vsftpd/anonymous/pub
    environment:
      - ANONYMOUS_ENABLE=YES
      - NO_ANON_PASSWORD=YES
      - LOCAL_ENABLE=NO
      # 關鍵安全參數：允許在 chroot 環境中有寫入權限 (避免 500/530 錯誤)
      - EXTRA_CONF=allow_writeable_chroot=YES
      - PASV_ADDRESS=192.168.17.133
      - PASV_MIN_PORT=30000
      - PASV_MAX_PORT=30009
      - LOG_STDOUT=YES
    restart: always
