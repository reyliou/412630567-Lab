version: '3.8'

services:
  nginx-gateway:
    image: openresty/openresty:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx-gateway/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - neo-mall
      - neo-status
      - neo-dev
    restart: always

  neo-status:
    image: nginx:alpine
    volumes:
      - ./site-a-status:/usr/share/nginx/html:ro
      - ./site-a-status/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  neo-dev:
    image: nginx:alpine
    volumes:
      - ./site-b-dev:/usr/share/nginx/html:ro
      - ./site-b-dev/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  neo-mall:
    build: ./site-c-mall
    ports:
      - "8081:8080"
    restart: always

  neo-ftp:
    image: delfer/alpine-ftp-server
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - ./site-d-ftp:/ftp/anonymous
    environment:
      - USERS=anonymous|anonymous
      - ADDRESS=${FTP_ADDRESS:-127.0.0.1}
      - MIN_PORT=30000
      - MAX_PORT=30009
    restart: always
