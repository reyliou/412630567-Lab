version: '3.8'

services:
  nginx-gateway:
    image: openresty/openresty:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx-gateway/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - neo-mall
      - neo-status
      - neo-dev
    restart: always

  neo-status:
    image: nginx:alpine
    volumes:
      - ./site-a-status:/usr/share/nginx/html:ro
      - ./site-a-status/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  neo-dev:
    image: nginx:alpine
    volumes:
      - ./site-b-dev:/usr/share/nginx/html:ro
      - ./site-b-dev/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: always

  neo-mall:
    build: ./site-c-mall
    restart: always

  neo-ftp:
    image: fauria/vsftpd
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      - ./site-d-ftp:/home/vsftpd/anonymous
    environment:
      # 允許匿名登入
      - ANONYMOUS_ENABLE=YES
      # 設定被動模式 IP 與埠範圍
      - PASV_ADDRESS=192.168.17.133
      - PASV_MIN_PORT=30000
      - PASV_MAX_PORT=30009
      # 停用日誌紀錄以加速連線
      - LOG_STDOUT=YES
    restart: always
