<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-Corp IT 系統狀態面版</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff99;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-shadow: 0 0 10px #00ff99;
        }
        .container {
            border: 2px solid #00ff99;
            padding: 40px;
            background: rgba(0, 255, 153, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 153, 0.2);
            border-radius: 10px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .status {
            font-size: 1.5em;
            margin: 10px 0;
        }
        .online {
            color: #00ff00;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEO-Corp IT 系統狀態</h1>
        <div class="status">核心系統: <span class="online">運作中 (ONLINE)</span></div>
        <div class="status">網路閘道: <span class="online">已連接 (CONNECTED)</span></div>
        <div class="status">資料庫: <span class="online">同步中 (SYNCED)</span></div>
    </div>
    <footer>
        System Engine: aiohttp/3.9.1
        <!-- [MAINTENANCE NOTICE] Internal debug endpoint active at /api/debug-system -->
        <!-- Required Header: X-NEO-DEBUG (Lua scripting enabled for diagnostic routines) -->
        <!-- Note: This interface is for IT personnel to run system health checks. -->
    </footer>
</body>
</html>
