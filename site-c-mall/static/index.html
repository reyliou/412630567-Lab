<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-MALL 網路商城 | 專業科技產品採購平台</title>
    <link rel="stylesheet" href="/assets-library/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo">NEO-MALL</div>
        <div class="search-bar">
            <input type="text" placeholder="搜尋專業科技產品...">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="nav-links">
            <a href="/">首頁</a>
            <span id="user-nav">
                <a href="/login">會員登入</a>
                <a href="/register">註冊帳號</a>
            </span>
            <a href="/cart" class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge" id="cart-count">0</span>
            </a>
        </div>
    </nav>

    <header class="hero">
        <h1>引領未來的科技與創新</h1>
        <p>為您的企業提供最尖端的硬體設備與技術解決方案，建構卓越的數位基礎設施。</p>
        <button class="btn" onclick="location.href='#product-list'">立即選購</button>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 2.5rem; font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;">精選產品</h2>
        <section class="products" id="product-list">
            <p>產品載入中...</p>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/assets-library/js/components.js"></script>

    <script>
        async function checkUser() {
            try {
                const response = await fetch('/api/user/me');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('user-nav').innerHTML = `
                        <a href="/dashboard">會員中心 (${user.username})</a>
                        <a href="#" onclick="logout()">登出</a>
                    `;
                    updateCartCount();
                }
            } catch (error) {}
        }

        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            location.reload();
        }

        async function updateCartCount() {
            try {
                const response = await fetch('/api/cart');
                if (response.ok) {
                    const cart = await response.json();
                    document.getElementById('cart-count').innerText = cart.length;
                }
            } catch (error) {}
        }

        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                const productList = document.getElementById('product-list');
                productList.innerHTML = '';
                
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-image-container">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <p class="price">${product.price}</p>
                        <button class="btn" onclick="location.href='/product/${product.id}'">查看詳情</button>
                    `;
                    productList.appendChild(card);
                });
            } catch (error) {
                console.error('載入產品列表時發生錯誤:', error);
                document.getElementById('product-list').innerHTML = '<p>產品載入失敗，請稍後再試。</p>';
            }
        }
        
        window.onload = () => {
            loadProducts();
            checkUser();
        };
    </script>
</body>
</html>
