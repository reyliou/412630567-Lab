<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 | NEO-MALL 網路商城</title>
    <link rel="stylesheet" href="/assets-library/style.css">
</head>
<body>
    <nav>
        <div class="logo">NEO-MALL</div>
        <div class="nav-links">
            <a href="/">首頁</a>
            <a href="/register">註冊帳號</a>
        </div>
    </nav>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 30px; font-size: 2rem;">會員登入</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">帳號</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密碼</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">登入</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                還沒有帳號？ <a href="/register" style="color: var(--primary-color);">立即註冊</a>
            </p>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/assets-library/js/components.js"></script>
    <script>
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    window.location.href = '/dashboard';
                } else {
                    alert(result.message || '登入失敗');
                }
            } catch (error) {
                alert('發生錯誤，請稍後再試。');
            }
        };
    </script>
</body>
</html>
